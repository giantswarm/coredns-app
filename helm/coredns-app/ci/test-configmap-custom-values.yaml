configmap:
  custom: |
    (cache-snip) {
      cache 30
    }

    (log-snip) {
      log . {
        class denial
        class error
      }
    }

    (loadbalance-snip) {
      loadbalance round_robin
    }

    (internal-forward-snip) {
      forward . 10.1.1.10 10.1.2.10
    }

    test1.example.com:1053 {
      import cache-snip
      import internal-forward-snip
      import log-snip
      import loadbalance-snip
    }
    test2.example.com:1053 {
      import cache-snip
      import internal-forward-snip
      import log-snip
      import loadbalance-snip
    }
hpa:
  maxReplicas: 50
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 0
resources:
  limits:
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi
