{{- $dnsPort := .Values.ports.dns.targetPort }}
{{- $metricsPort := coalesce .Values.ports.metrics.port .Values.ports.prometheus | default 9153 }}
{{- $loadbalance := coalesce .Values.coredns.loadbalance .Values.loadbalancePolicy | default "round_robin" }}
{{- $autopath := coalesce .Values.coredns.public.autopath .Values.configmap.autopath }}
{{- $serviceCIDR := coalesce .Values.coredns.cluster.serviceCIDR .Values.cluster.kubernetes.API.clusterIPRange }}
{{- $podCIDR := coalesce .Values.coredns.cluster.podCIDR .Values.cluster.calico.CIDR }}
{{- $custom := coalesce .Values.coredns.custom .Values.configmap.custom }}

{{- $logClasses := .Values.coredns.log }}
{{- if not $logClasses }}
  {{- $logClasses = splitList "\n" (.Values.configmap.log | trimAll "\n ") }}
{{- end }}

{{- $domains := .Values.coredns.cluster.domains }}
{{- if not $domains }}
  {{- $domains = splitList " " .Values.cluster.kubernetes.clusterDomain }}
{{- end }}

{{- $additionalLocalZones := .Values.coredns.additionalLocalZones }}
{{- if not $additionalLocalZones }}
  {{- $additionalLocalZones = .Values.additionalLocalZones }}
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
data:
  Corefile: |
    .:{{ $dnsPort }} {
        {{- include "coredns.cacheBlock" . | nindent 8 }}
        errors
        template ANY AAAA {
          rcode NOERROR
        }
        health :8080 {
          lameduck 5s
        }
        ready :8181
        log . {
          {{- range $logClasses }}
          class {{ . }}
          {{- end }}
        }
        loadbalance {{ $loadbalance }}
        prometheus :{{ $metricsPort }}
        {{- if .Values.coredns.public.upstreams }}
          {{- $options := coalesce .Values.coredns.public.options .Values.configmap.forwardOptions }}
          {{- if $options }}
        forward . {{ join " " .Values.coredns.public.upstreams }} {
          {{ $options | trimSuffix "\n" }}
        }
          {{- else }}
        forward . {{ join " " .Values.coredns.public.upstreams }}
          {{- end }}
        {{- else if .Values.configmap.forward }}
          {{- if .Values.configmap.forwardOptions }}
        forward{{- range (.Values.configmap.forward | trimAll "\n " | splitList "\n") }} {{ . }}{{- end }} {
          {{ .Values.configmap.forwardOptions | trimSuffix "\n" }}
        }
          {{- else }}
        forward{{- range (.Values.configmap.forward | trimAll "\n " | splitList "\n") }} {{ . }}{{- end }}
          {{- end }}
        {{- else }}
        forward . /etc/resolv.conf
        {{- end }}
        reload
        {{- if $autopath }}
        autopath {{ $autopath }}
        {{- end }}
    }
    {{- range $index, $domain := $domains }}
    {{- if not (has $domain $additionalLocalZones) }}
    {{ $domain }}:{{ $dnsPort }} {{- if (regexMatch ".local$" $domain ) }} {{ $serviceCIDR }}:{{ $dnsPort }} {{ $podCIDR }}:{{ $dnsPort }} {{- end }} {
        errors
        template ANY AAAA {
          rcode NOERROR
        }
        {{- include "coredns.cacheBlock" $ | nindent 8 }}
        health :8080 {
          lameduck 5s
        }
        ready :8181
        kubernetes {{ $domain }} {{- if (regexMatch ".local$" $domain ) }} {{ $serviceCIDR }} {{ $podCIDR }} {{- end }} {
          pods verified
        }
        log . {
          {{- range $logClasses }}
          class {{ . }}
          {{- end }}
        }
        loadbalance {{ $loadbalance }}
        prometheus :{{ $metricsPort }}
        reload
    }
    {{- end }}
    {{- end }}
    {{- if $additionalLocalZones }}
    {{- range $index, $domain := $additionalLocalZones }}
    {{- if not (eq $domain "") }}
    {{ $domain }}:{{ $dnsPort }} {
        errors
        template ANY AAAA {
          rcode NOERROR
        }
        {{- include "coredns.cacheBlock" $ | nindent 8 }}
        health :8080 {
          lameduck 5s
        }
        ready :8181
        kubernetes {{ $domain }} {
          pods verified
        }
        log . {
          {{- range $logClasses }}
          class {{ . }}
          {{- end }}
        }
        loadbalance {{ $loadbalance }}
        prometheus :{{ $metricsPort }}
        reload
    }
    {{- end }}
    {{- end }}
    {{- end }}
    {{- if $custom }}
    {{- range ($custom | trimAll "\n " | splitList "\n") }}
    {{ . }}
    {{- end }}
    {{- end }}
