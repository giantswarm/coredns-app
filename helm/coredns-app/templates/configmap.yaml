{{- $dnsPort := .Values.ports.dns.targetPort }}
{{- $metricsPort := coalesce .Values.ports.metrics.port .Values.ports.prometheus | default 9153 }}
{{- $autopath := coalesce .Values.coredns.public.autopath .Values.configmap.autopath }}
{{- $serviceCIDR := coalesce .Values.coredns.cluster.serviceCIDR .Values.cluster.kubernetes.API.clusterIPRange }}
{{- $podCIDR := coalesce .Values.coredns.cluster.podCIDR .Values.cluster.calico.CIDR }}
{{- $custom := coalesce .Values.coredns.custom .Values.configmap.custom }}

{{- $domains := .Values.coredns.cluster.domains }}
{{- if not $domains }}
  {{- $domains = splitList " " .Values.cluster.kubernetes.clusterDomain }}
{{- end }}

{{- $additionalZones := .Values.coredns.additionalZones }}
{{- $legacyZoneStrings := list }}
{{- if not $additionalZones }}
  {{- $legacyZoneStrings = coalesce .Values.coredns.additionalLocalZones .Values.additionalLocalZones | default (list) }}
{{- end }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "labels.common" . | nindent 4 }}
data:
  Corefile: |
    {{- $publicZone := dict "cache" .Values.coredns.public.cache "forward" .Values.coredns.public.forward "log" .Values.coredns.public.log "loadbalance" .Values.coredns.public.loadbalance "legacy" true }}
    .:{{ $dnsPort }} {
        {{- include "coredns.cacheBlock" (dict "zone" $publicZone "ctx" $) | nindent 8 }}
        errors
        template ANY AAAA {
          rcode NOERROR
        }
        health :8080 {
          lameduck 5s
        }
        ready :8181
        {{- include "coredns.logBlock" (dict "zone" $publicZone "ctx" $) | nindent 8 }}
        {{- include "coredns.loadbalanceBlock" (dict "zone" $publicZone "ctx" $) | nindent 8 }}
        prometheus :{{ $metricsPort }}
        {{- include "coredns.forwardBlock" (dict "zone" $publicZone "ctx" $) | nindent 8 }}
        reload
        {{- if $autopath }}
        autopath {{ $autopath }}
        {{- end }}
    }
    {{- range $index, $domain := $domains }}
    {{- if not (has $domain $legacyZoneStrings) }}
    {{- $cidrsList := list }}
    {{- if (regexMatch ".local$" $domain) }}{{ $cidrsList = list $serviceCIDR $podCIDR }}{{ end }}
    {{- $clusterZone := dict "names" (list $domain) "cidrs" $cidrsList "cache" $.Values.coredns.cluster.cache "kubernetes" $.Values.coredns.cluster.kubernetes "log" $.Values.coredns.cluster.log "loadbalance" $.Values.coredns.cluster.loadbalance }}
    {{ $domain }}:{{ $dnsPort }} {{- if (regexMatch ".local$" $domain ) }} {{ $serviceCIDR }}:{{ $dnsPort }} {{ $podCIDR }}:{{ $dnsPort }} {{- end }} {
        errors
        template ANY AAAA {
          rcode NOERROR
        }
        {{- include "coredns.cacheBlock" (dict "zone" $clusterZone "ctx" $) | nindent 8 }}
        health :8080 {
          lameduck 5s
        }
        ready :8181
        {{- include "coredns.kubernetesBlock" (dict "zone" $clusterZone "ctx" $) | nindent 8 }}
        {{- include "coredns.logBlock" (dict "zone" $clusterZone "ctx" $) | nindent 8 }}
        {{- include "coredns.loadbalanceBlock" (dict "zone" $clusterZone "ctx" $) | nindent 8 }}
        prometheus :{{ $metricsPort }}
        reload
    }
    {{- end }}
    {{- end }}
    {{- if $additionalZones }}
    {{- range $zone := $additionalZones }}
    {{- $names := list }}
    {{- range $zone.names }}{{ $names = append $names (printf "%s:%v" . $dnsPort) }}{{ end }}
    {{- range ($zone.cidrs | default list) }}{{ $names = append $names (printf "%s:%v" . $dnsPort) }}{{ end }}
    {{ join " " $names }} {
        errors
        template ANY AAAA {
          rcode NOERROR
        }
        {{- include "coredns.cacheBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        health :8080 {
          lameduck 5s
        }
        ready :8181
        {{- if $zone.kubernetes }}
        {{- include "coredns.kubernetesBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        {{- end }}
        {{- if $zone.forward }}
        {{- include "coredns.forwardBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        {{- end }}
        {{- include "coredns.logBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        {{- include "coredns.loadbalanceBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        prometheus :{{ $metricsPort }}
        reload
    }
    {{- end }}
    {{- else if $legacyZoneStrings }}
    {{- range $index, $domain := $legacyZoneStrings }}
    {{- if not (eq $domain "") }}
    {{- $zone := dict "names" (list $domain) "kubernetes" $.Values.coredns.cluster.kubernetes }}
    {{ $domain }}:{{ $dnsPort }} {
        errors
        template ANY AAAA {
          rcode NOERROR
        }
        {{- include "coredns.cacheBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        health :8080 {
          lameduck 5s
        }
        ready :8181
        {{- include "coredns.kubernetesBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        {{- include "coredns.logBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        {{- include "coredns.loadbalanceBlock" (dict "zone" $zone "ctx" $) | nindent 8 }}
        prometheus :{{ $metricsPort }}
        reload
    }
    {{- end }}
    {{- end }}
    {{- end }}
    {{- if $custom }}
    {{- range ($custom | trimAll "\n " | splitList "\n") }}
    {{ . }}
    {{- end }}
    {{- end }}
